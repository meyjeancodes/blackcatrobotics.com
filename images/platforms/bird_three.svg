<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0d0d0d"/>
  <!-- Deck -->
  <line x1="120" y1="260" x2="280" y2="260" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Front wheel -->
  <circle cx="140" cy="300" r="28" stroke="#00ccaa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="140" cy="300" r="4" stroke="#00ccaa" stroke-width="2" fill="none"/>
  <!-- Rear wheel -->
  <circle cx="270" cy="300" r="28" stroke="#00ccaa" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="270" cy="300" r="4" stroke="#00ccaa" stroke-width="2" fill="none"/>
  <!-- Front fork -->
  <line x1="140" y1="272" x2="140" y2="210" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Steering column -->
  <line x1="140" y1="210" x2="140" y2="150" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="110" y1="150" x2="170" y2="150" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stem support -->
  <line x1="140" y1="260" x2="140" y2="272" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rear frame -->
  <line x1="270" y1="272" x2="270" y2="260" stroke="#00ccaa" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Battery pack (under deck) -->
  <rect x="160" y="250" width="90" height="12" rx="3" stroke="#00ccaa" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Headlight -->
  <circle cx="140" cy="145" r="5" stroke="#00ccaa" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="rgba(255,255,255,0.25)">BIRD THREE · FLEET SCOOTER</text>
</svg>