<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0d0d0d"/>
  
  <!-- Cleaning robot body -->
  <g transform="translate(200,185)">
    <!-- Base platform -->
    <ellipse cx="0" cy="30" rx="72" ry="18" fill="none" stroke="#E84E1B" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="25" rx="65" ry="14" fill="none" stroke="#E84E1B" stroke-width="1.5"/>
    
    <!-- Main body dome -->
    <path d="M-50,25 Q-55,-10 -30,-35 Q0,-55 30,-35 Q55,-10 50,25" fill="none" stroke="#E84E1B" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Sensor ring -->
    <ellipse cx="0" cy="-10" rx="35" ry="8" fill="none" stroke="#E84E1B" stroke-width="1" opacity="0.4"/>
    
    <!-- Top sensor dome -->
    <path d="M-15,-35 Q0,-48 15,-35" fill="none" stroke="#E84E1B" stroke-width="1.5"/>
    <circle cx="0" cy="-40" r="4" fill="#E84E1B" opacity="0.5"/>
    
    <!-- Side brushes -->
    <g transform="translate(-58,28)" opacity="0.7">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#E84E1B" stroke-width="1"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#E84E1B" stroke-width="0.8"/>
      <line x1="-8" y1="8" x2="8" y2="-8" stroke="#E84E1B" stroke-width="0.8"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#E84E1B" stroke-width="0.8"/>
    </g>
    <g transform="translate(58,28)" opacity="0.7">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#E84E1B" stroke-width="1"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#E84E1B" stroke-width="0.8"/>
      <line x1="-8" y1="8" x2="8" y2="-8" stroke="#E84E1B" stroke-width="0.8"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#E84E1B" stroke-width="0.8"/>
    </g>
    
    <!-- Wheels -->
    <circle cx="-45" cy="35" r="6" fill="none" stroke="#E84E1B" stroke-width="1.5" opacity="0.5"/>
    <circle cx="45" cy="35" r="6" fill="none" stroke="#E84E1B" stroke-width="1.5" opacity="0.5"/>
    
    <!-- LED indicators -->
    <circle cx="-20" cy="-25" r="2" fill="#E84E1B" opacity="0.6"/>
    <circle cx="20" cy="-25" r="2" fill="#E84E1B" opacity="0.6"/>
    
    <!-- Ground cleaning path -->
    <line x1="-60" y1="45" x2="60" y2="45" stroke="#E84E1B" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4"/>
  </g>
  
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="monospace" font-size="9" letter-spacing="0.15em">EV FLEET CLEANER · CONCEPT</text>
</svg>
