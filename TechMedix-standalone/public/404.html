<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Page Not Found | BlackCat Robotics</title>
  <style>
    :root {
      --ink: #0D0D0D;
      --ink-2: #3A3A3A;
      --ink-3: #6B6B6B;
      --paper: #FAFAFA;
      --fire: #E84E1B;
      --fire-soft: #FFF3F0;
      --border: #E5E5E5;
      --white: #FFFFFF;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --display: 'Syne', system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #F5F5F5;
        --ink-2: #D0D0D0;
        --ink-3: #9CA3AF;
        --paper: #0A0A0A;
        --fire: #FF6B35;
        --fire-soft: #2D1B15;
        --border: #2A2A2A;
        --white: #FFFFFF;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--display);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      line-height: 1.6;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .error-code {
      font-family: var(--mono);
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 700;
      color: var(--fire);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--ink);
    }
    p {
      color: var(--ink-2);
      margin-bottom: 2rem;
      font-size: 1.05rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      background: var(--ink);
      color: var(--white);
      border: none;
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.15s ease, background 0.15s ease;
    }
    .btn:hover { transform: translateY(-2px); background: var(--ink-2); }
    .btn:active { transform: translateY(0); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink);
    }
    .btn-outline:hover { border-color: var(--ink); background: var(--fire-soft); }
    .btn-group { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .footer-note {
      margin-top: 3rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-3);
    }
    @media (prefers-color-scheme: dark) {
      .btn { background: var(--white); color: var(--ink); }
      .btn:hover { background: var(--ink-2); }
      .btn-outline { border-color: var(--border); color: var(--white); }
      .btn-outline:hover { border-color: var(--fire); background: var(--fire-soft); }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. No worries — it happens to the best of us.</p>
    <div class="btn-group">
      <a href="/" class="btn">← Back to Home</a>
      <a href="/index.html#contact" class="btn btn-outline">Contact Us</a>
    </div>
    <p class="footer-note">BlackCat Robotics · Infrastructure intelligence for autonomous systems</p>
  </div>
</body>
</html>
